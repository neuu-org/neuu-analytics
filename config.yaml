# Registro central dos datasets da org NEUU
# Cada entrada define como sincronizar e carregar um dataset

org: neuu-org

datasets:
  commentaries:
    name: "Bible Commentaries"
    repo: bible-commentaries-dataset
    description: "Comentarios patristicos e historicos (AD 100-1700)"
    data_glob: "data/01_cleaned/**/*.json"
    enriched_glob: "data/03_enriched/**/*.json"
    loader: commentaries
    enabled: true

  crossrefs:
    name: "Bible Cross-References"
    repo: bible-crossrefs-dataset
    description: "1.1M+ referencias cruzadas biblicas (OpenBible + TSK)"
    data_glob: "data/02_unified/verses/**/*.json"
    loader: crossrefs
    enabled: true

  bibletext:
    name: "Bible Text"
    repo: bible-text-dataset
    description: "17 traducoes biblicas (9 EN + 8 PT) em formato estruturado"
    data_glob: "data/01_structured/**/*.json"
    loader: bibletext
    enabled: true

  gazetteers:
    name: "Bible Gazetteers"
    repo: bible-gazetteers-dataset
    description: "2.474 entidades, 347 simbolos e 436 relacionamentos biblicos"
    data_glob: "data/pt/structured/*.json"
    loader: gazetteers
    enabled: true

  dictionary:
    name: "Bible Dictionary"
    repo: bible-dictionary-dataset
    description: "20.900 entradas de 5 dicionarios biblicos classicos (Easton, Smith, Hastings, Hitchcock, Schaff)"
    data_glob: "data/02_sources/**/*.json"
    loader: dictionary
    enabled: true
